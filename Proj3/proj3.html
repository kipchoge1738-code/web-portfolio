<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power BI Dashboard - Project 3</title>
  <link rel="stylesheet" href="proj3.css">
</head>
<body>
  <header>
    <h1>Power BI Dashboard</h1>
    <nav><a href="../index.html">Back to Portfolio</a></nav>
  </header>
  <main>
    <section>
      <h2>Project Overview</h2>
      <p>This project demonstrates building interactive dashboards and reports using Power BI, including data modeling and DAX formulas.</p>
    </section>
    <section>
      <h2>Features</h2>
      <ul>
        <li>Interactive Visualizations</li>
        <li>Data Modeling</li>
        <li>DAX Calculations</li>
        <li>Custom Reports</li>
      </ul>
    </section>
    <section>
      <div class="proj-images">
        <figure>
          <img src="project2a.jpeg" alt="Power BI Data Model" class="proj-img" loading="lazy" />
          <figcaption>Data model setup in Power BI for relational analysis.</figcaption>
        </figure>
        <figure>
          <img src="project3a.jpeg" alt="Power BI Visualization" class="proj-img" loading="lazy" />
          <figcaption>Interactive dashboard visualizing sales and trends.</figcaption>
        </figure>
        <figure>
          <img src="dasboard.png.png" alt="Power BI DAX Example" class="proj-img" loading="lazy" />
          <figcaption>DAX formula used for custom calculations.</figcaption>
        </figure>
        <figure>
          <img src="dashboard.png (2).png" alt="Power BI Report Example" class="proj-img" loading="lazy" />
          <figcaption>Final report layout for business presentation.</figcaption>
        </figure>
      </div>

    </section>
    <section>
      <h2>Demo</h2>
      <button id="analyzeBtn">Show Dashboard</button>
      <div id="result"></div>
    </section>
